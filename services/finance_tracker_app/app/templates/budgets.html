{% extends "base.html" %}
{% block title %}Budgets{% endblock %}
{% block content %}
<div class="row spread">
  <h1>Monthly budgets</h1>
  <form method="get" action="/budgets" class="month-form">
    <label>Month <input type="month" name="month" value="{{ month }}"></label>
    <button type="submit">Load</button>
  </form>
</div>

<div class="card narrow">
  <p class="muted">Set a spending limit per category for {{ month }}. Leave blank for no budget.</p>
  <form method="post" action="/budgets">
    <input type="hidden" name="month" value="{{ month }}">
    {% for category in categories %}
    <label>{{ category }}
      <input type="number" step="0.01" min="0" name="budget_{{ category }}"
             value="{{ existing.get(category, '') }}" placeholder="0.00">
    </label>
    {% endfor %}
    <button type="submit">Save budgets</button>
  </form>
</div>
{% endblock %}
